<script>
  firebase.initializeApp({
    databaseURL: "https://alfind-d4f0f-default-rtdb.firebaseio.com"
  });
  const db = firebase.database();

  async function fbGet(key) {
    try {
      const snap = await db.ref("alfind/" + key).get();
      return snap.exists() ? snap.val() : null;
    } catch { return null; }
  }

  async function fbSet(key, val) {
    try {
      await db.ref("alfind/" + key).set(val);
      return true;
    } catch { return false; }
  }
